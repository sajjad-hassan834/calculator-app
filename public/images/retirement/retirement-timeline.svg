  <text x="40" y="228" font-family="system-ui" font-size="20" font-weight="700" fill="#0F172A">$1.2M</text>
  <text x="40" y="250" font-family="system-ui" font-size="10" fill="#64748B">80% of pre-retirement income</text>
  <text x="40" y="268" font-family="system-ui" font-size="10" fill="#64748B">Based on $60K/year spending</text>
  <rect x="208" y="180" width="168" height="100" rx="10" fill="white" stroke="#E2E8F0"/>
  <text x="224" y="204" font-family="system-ui" font-size="11" font-weight="600" fill="#0F172A">Social Security</text>
  <text x="224" y="228" font-family="system-ui" font-size="16" font-weight="700" fill="#0F172A">$1,950/mo</text>
  <text x="224" y="250" font-family="system-ui" font-size="10" fill="#64748B">Estimated benefit</text>
  <text x="224" y="268" font-family="system-ui" font-size="10" fill="#64748B">At full retirement age</text>
