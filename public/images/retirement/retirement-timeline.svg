  <circle cx="200" cy="50" r="14" fill="#2563EB" opacity="0.4"/>
  <text x="196" y="54" font-family="system-ui" font-size="10" font-weight="700" fill="white">50</text>
  <text x="196" y="80" font-family="system-ui" font-size="9" fill="#64748B" text-anchor="middle">Mid</text>
  <circle cx="310" cy="50" r="14" fill="#0D9488"/>
  <text x="306" y="54" font-family="system-ui" font-size="10" font-weight="700" fill="white">65</text>
  <text x="306" y="80" font-family="system-ui" font-size="9" fill="#0D9488" text-anchor="middle">Retire</text>
  <text x="40" y="100" font-family="system-ui" font-size="10" fill="#64748B">Growth Phase</text>
  <text x="40" y="114" font-family="system-ui" font-size="10" fill="#64748B">Maximize contributions</text>
  <text x="40" y="128" font-family="system-ui" font-size="10" fill="#64748B">Aggressive allocation</text>
  <text x="220" y="100" font-family="system-ui" font-size="10" fill="#64748B">Conservation Phase</text>
  <text x="220" y="114" font-family="system-ui" font-size="10" fill="#64748B">Shift to bonds</text>
  <text x="220" y="128" font-family="system-ui" font-size="10" fill="#64748B">Reduce risk</text>
