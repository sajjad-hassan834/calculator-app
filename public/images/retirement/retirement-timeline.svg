<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F8FAFC"/>
  <text x="200" y="30" font-family="system-ui" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Retirement Timeline</text>
  <rect x="24" y="48" width="352" height="120" rx="12" fill="white" stroke="#E2E8F0"/>
  <rect x="40" y="62" width="320" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="40" y="62" width="200" height="3" rx="1.5" fill="#2563EB"/>
  <circle cx="80" cy="50" r="14" fill="#2563EB"/>
  <text x="76" y="54" font-family="system-ui" font-size="10" font-weight="700" fill="white">35</text>
