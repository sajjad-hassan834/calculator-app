  <rect x="36" y="90" width="144" height="1" fill="#E2E8F0"/>
  <text x="36" y="108" font-family="system-ui" font-size="10" fill="#64748B">Interest Rate</text>
  <text x="160" y="108" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">6.5%</text>
