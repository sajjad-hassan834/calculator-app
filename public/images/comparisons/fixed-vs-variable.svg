  <text x="220" y="194" font-family="system-ui" font-size="10" fill="#64748B">Initial Rate</text>
  <text x="344" y="194" font-family="system-ui" font-size="10" font-weight="600" fill="#64748B">Lower</text>
  <rect x="220" y="204" width="144" height="1" fill="#E2E8F0"/>
  <text x="220" y="222" font-family="system-ui" font-size="10" fill="#64748B">Best For</text>
  <text x="220" y="240" font-family="system-ui" font-size="9" fill="#64748B">Short-term owners</text>
  <text x="220" y="256" font-family="system-ui" font-size="9" fill="#64748B">Lower initial payment</text>
  <text x="220" y="272" font-family="system-ui" font-size="9" fill="#64748B">Risk-tolerant borrowers</text>
