<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F8FAFC"/>
  <text x="200" y="30" font-family="system-ui" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Fixed vs Variable Mortgage</text>
  <rect x="24" y="48" width="168" height="236" rx="12" fill="white" stroke="#E2E8F0"/>
  <rect x="36" y="60" width="60" height="24" rx="6" fill="#2563EB" opacity="0.1"/>
