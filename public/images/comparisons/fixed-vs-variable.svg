  <text x="160" y="126" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$1,864</text>
  <rect x="36" y="136" width="144" height="1" fill="#E2E8F0"/>
  <text x="36" y="154" font-family="system-ui" font-size="10" fill="#64748B">Payment Stability</text>
