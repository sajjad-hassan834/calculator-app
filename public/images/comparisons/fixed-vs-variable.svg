  <text x="36" y="256" font-family="system-ui" font-size="9" fill="#64748B">Budget certainty</text>
  <text x="36" y="272" font-family="system-ui" font-size="9" fill="#64748B">Risk-averse borrowers</text>
  <rect x="208" y="48" width="168" height="236" rx="12" fill="white" stroke="#E2E8F0"/>
  <rect x="220" y="60" width="60" height="24" rx="6" fill="#F59E0B" opacity="0.1"/>
  <text x="250" y="76" font-family="system-ui" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">Variable</text>
  <rect x="220" y="90" width="144" height="1" fill="#E2E8F0"/>
  <text x="220" y="108" font-family="system-ui" font-size="10" fill="#64748B">Interest Rate</text>
  <text x="344" y="108" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">5.5% (initial)</text>
  <text x="220" y="126" font-family="system-ui" font-size="10" fill="#64748B">Monthly Payment</text>
  <text x="344" y="126" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$1,701</text>
  <rect x="220" y="136" width="144" height="1" fill="#E2E8F0"/>
  <text x="220" y="154" font-family="system-ui" font-size="10" fill="#64748B">Payment Stability</text>
  <text x="344" y="154" font-family="system-ui" font-size="10" font-weight="600" fill="#F43F5E">Variable</text>
  <text x="220" y="174" font-family="system-ui" font-size="10" fill="#64748B">Rate Changes</text>
