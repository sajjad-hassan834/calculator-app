<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F8FAFC"/>
  <text x="200" y="30" font-family="system-ui" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Profit Analysis</text>
  <rect x="24" y="48" width="352" height="164" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="40" y="70" font-family="system-ui" font-size="11" font-weight="600" fill="#0F172A">Revenue vs Costs</text>
  <rect x="40" y="80" width="320" height="1" fill="#E2E8F0"/>
  <rect x="40" y="94" width="300" height="24" rx="4" fill="#2563EB" opacity="0.15"/>
  <text x="44" y="110" font-family="system-ui" font-size="10" fill="#0F172A">Revenue</text>
  <text x="310" y="110" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$100K</text>
  <rect x="40" y="126" width="180" height="24" rx="4" fill="#F43F5E" opacity="0.15"/>
  <text x="44" y="142" font-family="system-ui" font-size="10" fill="#0F172A">Fixed Costs</text>
  <text x="218" y="142" font-family="system-ui" font-size="10" font-weight="600" fill="#F43F5E">$40K</text>
  <rect x="40" y="158" width="120" height="24" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="44" y="174" font-family="system-ui" font-size="10" fill="#0F172A">Variable Costs</text>
  <text x="158" y="174" font-family="system-ui" font-size="10" font-weight="600" fill="#F59E0B">$30K</text>
  <rect x="40" y="190" width="320" height="1" fill="#E2E8F0"/>
  <text x="40" y="208" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">Gross Profit</text>
  <text x="310" y="208" font-family="system-ui" font-size="12" font-weight="700" fill="#10B981">$30K (30%)</text>
  <rect x="24" y="224" width="168" height="60" rx="10" fill="white" stroke="#E2E8F0"/>
  <text x="40" y="246" font-family="system-ui" font-size="10" fill="#64748B">Break-Even Point</text>
  <text x="40" y="268" font-family="system-ui" font-size="16" font-weight="700" fill="#0F172A">$57,143</text>
  <rect x="208" y="224" width="168" height="60" rx="10" fill="white" stroke="#E2E8F0"/>
  <text x="224" y="246" font-family="system-ui" font-size="10" fill="#64748B">Contribution Margin</text>
  <text x="224" y="268" font-family="system-ui" font-size="16" font-weight="700" fill="#0F172A">70%</text>
</svg>