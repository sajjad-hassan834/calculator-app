<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F8FAFC"/>
  <text x="200" y="30" font-family="system-ui" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Break-Even Analysis</text>
  <rect x="24" y="48" width="352" height="100" rx="12" fill="white" stroke="#E2E8F0"/>
  <rect x="40" y="62" width="320" height="1" fill="#E2E8F0"/>
  <text x="40" y="80" font-family="system-ui" font-size="10" fill="#64748B">Fixed Costs</text>
  <text x="150" y="80" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$40,000</text>
  <text x="220" y="80" font-family="system-ui" font-size="10" fill="#64748B">Price per Unit</text>
  <text x="320" y="80" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$100</text>
  <text x="40" y="100" font-family="system-ui" font-size="10" fill="#64748B">Variable Cost</text>
  <text x="150" y="100" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$30</text>
  <text x="220" y="100" font-family="system-ui" font-size="10" fill="#64748B">Contribution Margin</text>
  <text x="320" y="100" font-family="system-ui" font-size="10" font-weight="600" fill="#10B981">$70</text>
  <rect x="24" y="160" width="168" height="56" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="40" y="184" font-family="system-ui" font-size="11" fill="#64748B">Break-Even (units)</text>
  <text x="40" y="204" font-family="system-ui" font-size="20" font-weight="700" fill="#2563EB">572 units</text>
  <rect x="208" y="160" width="168" height="56" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="224" y="184" font-family="system-ui" font-size="11" fill="#64748B">Break-Even (revenue)</text>
  <text x="224" y="204" font-family="system-ui" font-size="20" font-weight="700" fill="#2563EB">$57,200</text>
  <rect x="24" y="228" width="352" height="56" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="40" y="250" font-family="system-ui" font-size="11" font-weight="600" fill="#0F172A">Profit Zone</text>
  <rect x="40" y="260" width="320" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="40" y="260" width="160" height="3" rx="1.5" fill="#F43F5E"/>
  <text x="120" y="276" font-family="system-ui" font-size="9" fill="#F43F5E" text-anchor="middle">Loss</text>
  <circle cx="200" cy="262" r="5" fill="#2563EB"/>
  <rect x="240" y="260" width="120" height="3" rx="1.5" fill="#10B981"/>
  <text x="300" y="276" font-family="system-ui" font-size="9" fill="#10B981" text-anchor="middle">Profit</text>
</svg>