  <text x="220" y="98" font-family="system-ui" font-size="9" fill="#64748B">Open methodology</text>
  <text x="220" y="112" font-family="system-ui" font-size="9" fill="#64748B">documentation for</text>
  <text x="220" y="126" font-family="system-ui" font-size="9" fill="#64748B">every calculator</text>
  <text x="220" y="144" font-family="system-ui" font-size="9" fill="#64748B">formula and process</text>
  <rect x="24" y="172" width="168" height="112" rx="10" fill="white" stroke="#E2E8F0"/>
  <rect x="36" y="184" width="144" height="1" fill="#E2E8F0"/>
  <text x="36" y="204" font-family="system-ui" font-size="11" font-weight="600" fill="#0F172A">Cross-Validated</text>
