  <text x="36" y="112" font-family="system-ui" font-size="9" fill="#64748B">widely accepted</text>
  <text x="36" y="126" font-family="system-ui" font-size="9" fill="#64748B">financial formulas</text>
  <text x="36" y="144" font-family="system-ui" font-size="9" fill="#64748B">from academic texts</text>
  <rect x="208" y="48" width="168" height="112" rx="10" fill="white" stroke="#E2E8F0"/>
