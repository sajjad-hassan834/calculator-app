<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F8FAFC"/>
  <text x="200" y="30" font-family="system-ui" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Tax Brackets</text>
  <rect x="24" y="46" width="352" height="240" rx="12" fill="white" stroke="#E2E8F0"/>
  <text x="40" y="68" font-family="system-ui" font-size="11" font-weight="600" fill="#0F172A">2026 Progressive Tax Brackets</text>
  <rect x="40" y="78" width="320" height="1" fill="#E2E8F0"/>
  <rect x="40" y="90" width="30" height="16" rx="3" fill="#8B5CF6" opacity="0.2"/>
  <text x="80" y="103" font-family="system-ui" font-size="10" fill="#0F172A">10%</text>
  <text x="120" y="103" font-family="system-ui" font-size="10" fill="#64748B">$0 - $11,600</text>
  <text x="320" y="103" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$1,160</text>
  <rect x="40" y="114" width="72" height="16" rx="3" fill="#8B5CF6" opacity="0.3"/>
  <text x="120" y="127" font-family="system-ui" font-size="10" fill="#0F172A">12%</text>
  <text x="160" y="127" font-family="system-ui" font-size="10" fill="#64748B">$11,601 - $47,150</text>
  <text x="320" y="127" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$4,266</text>
  <rect x="40" y="138" width="110" height="16" rx="3" fill="#8B5CF6" opacity="0.4"/>
  <text x="160" y="151" font-family="system-ui" font-size="10" fill="#0F172A">22%</text>
  <text x="200" y="151" font-family="system-ui" font-size="10" fill="#64748B">$47,151 - $100,525</text>
  <text x="320" y="151" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$11,742</text>
  <rect x="40" y="162" width="140" height="16" rx="3" fill="#8B5CF6" opacity="0.55"/>
  <text x="190" y="175" font-family="system-ui" font-size="10" fill="#0F172A">24%</text>
  <text x="230" y="175" font-family="system-ui" font-size="10" fill="#64748B">$100,526 - $191,950</text>
  <text x="320" y="175" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$21,942</text>
  <rect x="40" y="186" width="170" height="16" rx="3" fill="#8B5CF6" opacity="0.7"/>
  <text x="220" y="199" font-family="system-ui" font-size="10" fill="#0F172A">32%</text>
  <text x="260" y="199" font-family="system-ui" font-size="10" fill="#64748B">$191,951 - $243,725</text>
  <text x="320" y="199" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$16,568</text>
  <rect x="40" y="210" width="200" height="16" rx="3" fill="#8B5CF6" opacity="0.85"/>
  <text x="250" y="223" font-family="system-ui" font-size="10" fill="#0F172A">35%</text>
  <text x="290" y="223" font-family="system-ui" font-size="10" fill="#64748B">$243,726+</text>
  <text x="320" y="223" font-family="system-ui" font-size="10" font-weight="600" fill="#0F172A">$0+</text>
  <rect x="40" y="242" width="320" height="1" fill="#E2E8F0"/>
  <text x="40" y="262" font-family="system-ui" font-size="10" fill="#64748B">Effective rate is always less than marginal rate</text>
  <text x="40" y="278" font-family="system-ui" font-size="9" fill="#64748B">Example: $75K income = 15.4% effective, 22% marginal</text>
</svg>